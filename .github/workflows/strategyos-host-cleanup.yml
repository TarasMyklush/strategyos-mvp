name: StrategyOS Host Cleanup
on:
  workflow_dispatch:
jobs:
  cleanup:
    runs-on: ubuntu-24.04
    environment: hetzner-qa
    steps:
      - name: Prepare SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${HETZNER_SSH_KEY}" > "${HOME}/.ssh/strategyos_deploy"
          chmod 600 "${HOME}/.ssh/strategyos_deploy"
          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          echo "SSH_OPTS=-i ${HOME}/.ssh/strategyos_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" >> "${GITHUB_ENV}"
      
      - name: Check disk before cleanup
        run: |
          echo "=== Disk BEFORE cleanup ==="
          ssh ${SSH_OPTS} "root@178.105.169.155" "df -h / && echo '' && docker system df"
          echo ""
          echo "=== Largest directories ==="
          ssh ${SSH_OPTS} "root@178.105.169.155" "du -sh /var/lib/docker/* 2>/dev/null | sort -rh | head -10 || true"
      
      - name: Docker prune
        run: |
          echo "=== Pruning stopped containers ==="
          ssh ${SSH_OPTS} "root@178.105.169.155" "docker container prune --force" || true
          
          echo "=== Pruning unused images (not --all to keep tagged) ==="
          ssh ${SSH_OPTS} "root@178.105.169.155" "docker image prune --force" || true
          
          echo "=== Pruning build cache ==="
          ssh ${SSH_OPTS} "root@178.105.169.155" "docker builder prune --force" || true
          
          echo "=== Pruning unused networks ==="
          ssh ${SSH_OPTS} "root@178.105.169.155" "docker network prune --force" || true
      
      - name: Check disk after cleanup
        run: |
          echo "=== Disk AFTER cleanup ==="
          ssh ${SSH_OPTS} "root@178.105.169.155" "df -h / && echo '' && docker system df"
