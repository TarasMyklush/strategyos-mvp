name: StrategyOS Deploy

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: GitHub environment to deploy
        required: true
        type: choice
        default: hetzner-qa
        options:
          - hetzner-qa
          - production
      run_smoke:
        description: Start one protected /runs smoke request after readiness passes
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  deployments: write

concurrency:
  group: strategyos-deploy-${{ inputs.target_environment }}
  cancel-in-progress: false

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  CI_TEST_TARGETS: >-
    tests/test_runtime_governance.py
    tests/test_governed_review_flow_e2e.py
    tests/test_frontend_shell.py
    tests/test_api_health.py
    tests/test_api_identity_boundary.py
    tests/test_api_security_boundary.py
    tests/test_deploy_config_hygiene.py
    tests/test_detector_registry.py
    tests/test_task_registry.py
    tests/test_source_pack.py
    tests/test_ocr.py
    tests/test_prompt_injection.py
    tests/test_sensitive_ids.py
    tests/test_data_roles.py
    tests/test_plugins.py

jobs:
  tests:
    name: Pre-deploy tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Install OCR runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr tesseract-ocr-eng

      - name: Install package and test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest -q ${CI_TEST_TARGETS}

  image:
    name: Build and publish image
    runs-on: ubuntu-24.04
    needs: tests
    timeout-minutes: 30
    outputs:
      image-ref: ${{ steps.image-ref.outputs.value }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=manual-${{ github.run_number }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            POPPLER_UTILS_VERSION=25.03.0-5+deb13u3

      - name: Export digest image ref
        id: image-ref
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "value=${IMAGE_NAME}@${IMAGE_DIGEST}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-24.04
    needs: image
    timeout-minutes: 30
    environment:
      name: ${{ inputs.target_environment }}
      url: ${{ vars.STRATEGYOS_PUBLIC_URL }}
    env:
      TARGET_HOST: ${{ vars.HETZNER_USER }}@${{ vars.HETZNER_HOST }}
      TARGET_DIR: ${{ vars.TARGET_DIR || '/opt/strategyos' }}
      STRATEGYOS_API_IMAGE: ${{ needs.image.outputs.image-ref }}
      STRATEGYOS_COMPOSE_FILES: ${{ vars.STRATEGYOS_COMPOSE_FILES }}
      STRATEGYOS_HTTP_PORT: ${{ vars.STRATEGYOS_HTTP_PORT || '80' }}
      STRATEGYOS_HTTPS_PORT: ${{ vars.STRATEGYOS_HTTPS_PORT || '443' }}
      STRATEGYOS_SITE_ADDRESS: ${{ vars.STRATEGYOS_SITE_ADDRESS || ':80' }}
      STRATEGYOS_IDP_ISSUER: ${{ vars.STRATEGYOS_IDP_ISSUER || 'http://localhost:8089' }}
      STRATEGYOS_DEMO_ROLE_LOGIN_ENABLED: ${{ vars.STRATEGYOS_DEMO_ROLE_LOGIN_ENABLED || 'false' }}
      STRATEGYOS_PUBLIC_HEALTH_ENABLED: ${{ vars.STRATEGYOS_PUBLIC_HEALTH_ENABLED || 'false' }}
      STRATEGYOS_REQUIRE_HUMAN_REVIEW: ${{ vars.STRATEGYOS_REQUIRE_HUMAN_REVIEW || 'true' }}
      STRATEGYOS_SYNC_ARTIFACTS: ${{ vars.STRATEGYOS_SYNC_ARTIFACTS || 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Prepare SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
        run: |
          test -n "${HETZNER_SSH_KEY}"
          test -n "${HETZNER_KNOWN_HOSTS}"
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${HETZNER_SSH_KEY}" > "${HOME}/.ssh/strategyos_deploy"
          chmod 600 "${HOME}/.ssh/strategyos_deploy"
          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          echo "SSH_OPTS=-i ${HOME}/.ssh/strategyos_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" >> "${GITHUB_ENV}"

      - name: Render deploy config
        run: |
          cp deploy/.env.example deploy/.env.ci
          python - <<'PY'
          from pathlib import Path
          import os

          env_path = Path("deploy/.env.ci")
          values = {}
          order = []
          for line in env_path.read_text(encoding="utf-8").splitlines():
              if line and not line.startswith("#") and "=" in line:
                  key, value = line.split("=", 1)
                  values[key] = value
                  order.append(key)

          overrides = {
              "STRATEGYOS_API_IMAGE": os.environ["STRATEGYOS_API_IMAGE"],
              "STRATEGYOS_HTTP_PORT": os.environ["STRATEGYOS_HTTP_PORT"],
              "STRATEGYOS_HTTPS_PORT": os.environ["STRATEGYOS_HTTPS_PORT"],
              "STRATEGYOS_SITE_ADDRESS": os.environ["STRATEGYOS_SITE_ADDRESS"],
              "STRATEGYOS_IDP_ISSUER": os.environ["STRATEGYOS_IDP_ISSUER"],
              "STRATEGYOS_DEMO_ROLE_LOGIN_ENABLED": os.environ["STRATEGYOS_DEMO_ROLE_LOGIN_ENABLED"],
              "STRATEGYOS_PUBLIC_HEALTH_ENABLED": os.environ["STRATEGYOS_PUBLIC_HEALTH_ENABLED"],
              "STRATEGYOS_REQUIRE_HUMAN_REVIEW": os.environ["STRATEGYOS_REQUIRE_HUMAN_REVIEW"],
              "STRATEGYOS_SYNC_ARTIFACTS": os.environ["STRATEGYOS_SYNC_ARTIFACTS"],
          }
          for key, value in overrides.items():
              if "\n" in value:
                  raise SystemExit(f"{key} contains a newline")
              values[key] = value
              if key not in order:
                  order.append(key)

          env_path.write_text("\n".join(f"{key}={values[key]}" for key in order) + "\n", encoding="utf-8")
          PY

      - name: Render deploy secrets
        env:
          STRATEGYOS_ENV_SECRETS: ${{ secrets.STRATEGYOS_ENV_SECRETS }}
        run: |
          test -n "${STRATEGYOS_ENV_SECRETS}"
          printf '%s\n' "${STRATEGYOS_ENV_SECRETS}" > deploy/.env.secrets.ci
          grep -q '^POSTGRES_PASSWORD=' deploy/.env.secrets.ci
          grep -q '^STRATEGYOS_IDP_CLIENT_SECRET=' deploy/.env.secrets.ci
          ! grep -q '__CHANGE_ME_' deploy/.env.secrets.ci

      - name: Validate release compose config
        run: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.release.yml -f deploy/docker-compose.hetzner-qa.yml --env-file deploy/.env.ci --env-file deploy/.env.secrets.ci config -q

      - name: Log remote host in to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: printf '%s' "${GHCR_TOKEN}" | ssh ${SSH_OPTS} "${TARGET_HOST}" "docker login ghcr.io -u '${GITHUB_ACTOR}' --password-stdin"

      - name: Deploy compose stack
        id: deploy
        run: |
          compose_files="${STRATEGYOS_COMPOSE_FILES:-deploy/docker-compose.yml deploy/docker-compose.release.yml deploy/docker-compose.hetzner-qa.yml}"
          TARGET_HOST="${TARGET_HOST}" \
          TARGET_DIR="${TARGET_DIR}" \
          SSH_OPTS="${SSH_OPTS}" \
          LOCAL_ENV=deploy/.env.ci \
          LOCAL_SECRETS_ENV=deploy/.env.secrets.ci \
          COMPOSE_FILES="${compose_files}" \
          bash deploy/scripts/deploy_stack.sh

      - name: Check protected readiness
        id: health
        run: |
          token="$(TARGET_HOST="${TARGET_HOST}" TARGET_DIR="${TARGET_DIR}" SSH_OPTS="${SSH_OPTS}" ROLE=operator bash deploy/scripts/remote_idp_token.sh)"
          echo "::add-mask::${token}"
          READINESS_AUTH_HEADER="Authorization: Bearer ${token}" \
          TARGET_URL="${STRATEGYOS_PUBLIC_URL}" \
          bash deploy/scripts/check_health.sh

      - name: Optional smoke run
        if: ${{ inputs.run_smoke }}
        run: |
          token="$(TARGET_HOST="${TARGET_HOST}" TARGET_DIR="${TARGET_DIR}" SSH_OPTS="${SSH_OPTS}" ROLE=operator bash deploy/scripts/remote_idp_token.sh)"
          echo "::add-mask::${token}"
          RUN_AUTH_HEADER="Authorization: Bearer ${token}" \
          TARGET_URL="${STRATEGYOS_PUBLIC_URL}" \
          bash deploy/scripts/run_remote_workflow.sh

      - name: Roll back if post-deploy check fails
        if: ${{ failure() && steps.deploy.outcome == 'success' }}
        run: |
          compose_files="${STRATEGYOS_COMPOSE_FILES:-deploy/docker-compose.yml deploy/docker-compose.release.yml deploy/docker-compose.hetzner-qa.yml}"
          TARGET_HOST="${TARGET_HOST}" \
          TARGET_DIR="${TARGET_DIR}" \
          SSH_OPTS="${SSH_OPTS}" \
          COMPOSE_FILES="${compose_files}" \
          bash deploy/scripts/rollback_stack.sh
