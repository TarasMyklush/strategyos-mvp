name: StrategyOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: strategyos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  CI_TEST_TARGETS: >-
    tests/test_runtime_governance.py
    tests/test_governed_review_flow_e2e.py
    tests/test_frontend_shell.py
    tests/test_api_health.py
    tests/test_api_identity_boundary.py
    tests/test_api_security_boundary.py
    tests/test_deploy_config_hygiene.py
    tests/test_detector_registry.py
    tests/test_task_registry.py
    tests/test_source_pack.py
    tests/test_ocr.py
    tests/test_prompt_injection.py
    tests/test_sensitive_ids.py
    tests/test_data_roles.py
    tests/test_plugins.py

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip

      - name: Install OCR runtime
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list 2>/dev/null || true
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr tesseract-ocr-eng

      - name: Install package and test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest -q ${CI_TEST_TARGETS}

  compose-contract:
    name: Compose contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Generate disposable compose env
        run: SECRETS_FILE=deploy/.env.secrets.ci deploy/scripts/generate_env.sh deploy/.env.ci

      - name: Validate source-build compose
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env.ci --env-file deploy/.env.secrets.ci config -q

      - name: Validate release-image compose
        env:
          STRATEGYOS_API_IMAGE: ghcr.io/example/strategyos-mvp:test
        run: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.release.yml -f deploy/docker-compose.hetzner-qa.yml --env-file deploy/.env.ci --env-file deploy/.env.secrets.ci config -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-24.04
    needs:
      - tests
      - compose-contract
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          build-args: |
            POPPLER_UTILS_VERSION=25.03.0-5+deb13u3
