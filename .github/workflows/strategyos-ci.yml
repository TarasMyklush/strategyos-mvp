name: StrategyOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: strategyos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install OCR runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr tesseract-ocr-eng

      - name: Install package and test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest -q

  compose-contract:
    name: Compose contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Generate disposable compose env
        run: SECRETS_FILE=deploy/.env.secrets.ci deploy/scripts/generate_env.sh deploy/.env.ci

      - name: Validate source-build compose
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env.ci --env-file deploy/.env.secrets.ci config -q

      - name: Validate release-image compose
        env:
          STRATEGYOS_API_IMAGE: ghcr.io/example/strategyos-mvp:test
        run: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.release.yml -f deploy/docker-compose.hetzner-qa.yml --env-file deploy/.env.ci --env-file deploy/.env.secrets.ci config -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-24.04
    needs:
      - tests
      - compose-contract
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          build-args: |
            POPPLER_UTILS_VERSION=25.03.0-5+deb13u3
