name: StrategyOS CI

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "deploy/README.md"
      - "docs/**"
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "deploy/README.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: strategyos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  # Full suite. Do NOT hand-pick a subset here again: a hand-picked list
  # silently stops gating every file added after it was written, which is
  # exactly how test_qa.py / test_llm_qa.py / test_case_file_writer.py /
  # the Oracle phase tests / all twins tests went unguarded and main
  # shipped red for multiple review cycles while this workflow reported
  # green. Tests requiring live external services self-skip via
  # pytest.ini_options markers ("integration") or an env-var skipif guard
  # (see test_governed_review_flow_postgres_e2e.py,
  # test_graph_queries_neo4j_e2e.py, test_graph_retrieval_neo4j_e2e.py) --
  # they do not need to be excluded here.
  CI_TEST_TARGETS: "tests/"
  # Local dev machines resolve the default dataset from a sibling
  # "strategy os/StrategyOS POC/01_Synthetic_Dataset" folder outside this
  # repo (see config.py's STRATEGYOS_POC_ROOT default). That folder was
  # never checked into git and does not exist on a fresh CI checkout, so
  # point the default dataset at the copy vendored under tests/fixtures/
  # instead. This does not change local dev behavior -- it only sets the
  # override env var config.py already supports.
  STRATEGYOS_SOURCE_DATASET: "${{ github.workspace }}/tests/fixtures/01_Synthetic_Dataset"

jobs:
  tests:
    name: Python tests
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install OCR runtime
        run: |
          # Aggressively disable ALL Microsoft/Azure apt sources — ubuntu-24.04 runner
          # images configure azure-cli via arbitrary file paths and formats.
          # Find any file under /etc/apt/ mentioning packages.microsoft.com and remove.
          for f in $(sudo grep -rl 'packages.microsoft.com' /etc/apt/ 2>/dev/null || true); do
            sudo rm -f "$f"
          done
          # Also nuke any remaining microsoft*/azure* source files by name glob
          sudo find /etc/apt/ -type f \( -name '*microsoft*' -o -name '*azure*' \) -delete 2>/dev/null || true
          # Allow insecure repos in case a stale apt cache entry still references the URL
          sudo apt-get update -o Acquire::AllowInsecureRepositories=true
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr tesseract-ocr-eng

      - name: Install package and test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest -q ${CI_TEST_TARGETS}

  compose-contract:
    name: Compose contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Generate disposable compose env
        run: SECRETS_FILE=deploy/.env.secrets.ci deploy/scripts/generate_env.sh deploy/.env.ci

      - name: Validate source-build compose
        run: docker compose -f deploy/docker-compose.yml --env-file deploy/.env.ci --env-file deploy/.env.secrets.ci config -q

      - name: Validate release-image compose
        env:
          STRATEGYOS_API_IMAGE: ghcr.io/example/strategyos-mvp:test
        run: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.release.yml -f deploy/docker-compose.hetzner-qa.yml --env-file deploy/.env.ci --env-file deploy/.env.secrets.ci config -q

  docker-build:
    name: Docker build
    runs-on: ubuntu-24.04
    needs:
      - tests
      - compose-contract
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          cache-from: type=gha,scope=strategyos-runtime
          cache-to: type=gha,mode=max,scope=strategyos-runtime,ignore-error=true
          build-args: |
            POPPLER_UTILS_VERSION=25.03.0-5+deb13u4
