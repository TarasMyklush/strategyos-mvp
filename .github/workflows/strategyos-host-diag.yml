name: StrategyOS Host Diagnostics
on:
  workflow_dispatch:
jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    environment: hetzner-qa
    steps:
      - name: Prepare SSH
        env:
          HETZNER_SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HETZNER_KNOWN_HOSTS: ${{ secrets.HETZNER_KNOWN_HOSTS }}
        run: |
          install -m 700 -d "${HOME}/.ssh"
          printf '%s\n' "${HETZNER_SSH_KEY}" > "${HOME}/.ssh/strategyos_deploy"
          chmod 600 "${HOME}/.ssh/strategyos_deploy"
          printf '%s\n' "${HETZNER_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          echo "SSH_OPTS=-i ${HOME}/.ssh/strategyos_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" >> "${GITHUB_ENV}"
      
      - name: Host diagnostics
        run: |
          TARGET_HOST="root@178.105.169.155"
          TARGET_DIR="/opt/strategyos"
          
          echo "=== Container states ==="
          ssh ${SSH_OPTS} "${TARGET_HOST}" "docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'" || true
          echo ""
          
          echo "=== Disk space ==="
          ssh ${SSH_OPTS} "${TARGET_HOST}" "df -h" || true
          ssh ${SSH_OPTS} "${TARGET_HOST}" "docker system df" || true
          echo ""
          
          echo "=== Minio logs ==="
          ssh ${SSH_OPTS} "${TARGET_HOST}" "docker logs strategyos-minio-1 --tail 100 2>&1 || echo 'NO_MINIO_CONTAINER'" || true
          echo ""
          
          echo "=== Minio create bucket logs ==="
          ssh ${SSH_OPTS} "${TARGET_HOST}" "docker logs strategyos-minio-create-bucket-1 --tail 50 2>&1 || echo 'NO_MINIO_CREATE_CONTAINER'" || true
          echo ""
          
          echo "=== Minio volume ==="
          ssh ${SSH_OPTS} "${TARGET_HOST}" "docker volume ls | grep minio || echo 'NO_MINIO_VOLUME'" || true
          echo ""
          
          echo "=== Env file check (secrets keys only) ==="
          ssh ${SSH_OPTS} "${TARGET_HOST}" "cd ${TARGET_DIR}/app && cut -d= -f1 deploy/.env.secrets 2>&1 || echo 'NO_ENV_FILE'" || true
          echo ""
          
          echo "=== Minio container inspect ==="
          ssh ${SSH_OPTS} "${TARGET_HOST}" "docker inspect strategyos-minio-1 --format '{{.State.Status}} {{.State.Health.Status}}' 2>&1 || echo 'NO_MINIO'" || true
