name: strategyos

services:
  strategyos-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CA_CERTIFICATES_VERSION: ${STRATEGYOS_RUNTIME_DEP_CA_CERTIFICATES_VERSION:-20250419}
        CURL_VERSION: ${STRATEGYOS_RUNTIME_DEP_CURL_VERSION:-8.14.1-2+deb13u3}
        POPPLER_UTILS_VERSION: ${STRATEGYOS_RUNTIME_DEP_POPPLER_UTILS_VERSION:-25.03.0-5+deb13u3}
        TESSERACT_OCR_VERSION: ${STRATEGYOS_RUNTIME_DEP_TESSERACT_VERSION:-5.5.0-1+b1}
        TESSERACT_OCR_ENG_VERSION: ${STRATEGYOS_RUNTIME_DEP_TESSERACT_ENG_VERSION:-1:4.1.0-2}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-strategyos}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env.secrets}@postgres:5432/${POSTGRES_DB:-strategyos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in deploy/.env.secrets}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      STRATEGYOS_OBJECT_ENDPOINT: ${STRATEGYOS_OBJECT_ENDPOINT:-http://minio:9000}
      STRATEGYOS_OBJECT_BUCKET: ${STRATEGYOS_OBJECT_BUCKET:-strategyos}
      STRATEGYOS_OBJECT_ACCESS_KEY_ID: ${STRATEGYOS_OBJECT_ACCESS_KEY_ID:-strategyos}
      STRATEGYOS_OBJECT_SECRET_ACCESS_KEY: ${STRATEGYOS_OBJECT_SECRET_ACCESS_KEY:?Set STRATEGYOS_OBJECT_SECRET_ACCESS_KEY in deploy/.env.secrets}
      STRATEGYOS_OBJECT_REGION: ${STRATEGYOS_OBJECT_REGION:-us-east-1}
      STRATEGYOS_OBJECT_PREFIX: ${STRATEGYOS_OBJECT_PREFIX:-strategyos}
      STRATEGYOS_OBJECT_FORCE_PATH_STYLE: ${STRATEGYOS_OBJECT_FORCE_PATH_STYLE:-true}
      STRATEGYOS_API_AUTH_ENABLED: ${STRATEGYOS_API_AUTH_ENABLED:-true}
      STRATEGYOS_DEMO_ROLE_LOGIN_ENABLED: ${STRATEGYOS_DEMO_ROLE_LOGIN_ENABLED:-false}
      STRATEGYOS_IDP_ENABLED: ${STRATEGYOS_IDP_ENABLED:-true}
      STRATEGYOS_IDP_ISSUER: ${STRATEGYOS_IDP_ISSUER:-http://localhost:${STRATEGYOS_IDP_HTTP_PORT:-8089}}
      STRATEGYOS_IDP_TOKEN_URL: ${STRATEGYOS_IDP_TOKEN_URL:-http://strategyos-idp:9000/oauth/token}
      STRATEGYOS_IDP_INTROSPECTION_URL: ${STRATEGYOS_IDP_INTROSPECTION_URL:-http://strategyos-idp:9000/oauth/introspect}
      STRATEGYOS_IDP_CLIENT_ID: ${STRATEGYOS_IDP_CLIENT_ID:-strategyos-local-client}
      STRATEGYOS_IDP_CLIENT_SECRET: ${STRATEGYOS_IDP_CLIENT_SECRET:?Set STRATEGYOS_IDP_CLIENT_SECRET in deploy/.env.secrets}
      STRATEGYOS_IDP_OPERATOR_USERNAME: ${STRATEGYOS_IDP_OPERATOR_USERNAME:-operator.local}
      STRATEGYOS_IDP_OPERATOR_PASSWORD: ${STRATEGYOS_IDP_OPERATOR_PASSWORD:?Set STRATEGYOS_IDP_OPERATOR_PASSWORD in deploy/.env.secrets}
      STRATEGYOS_IDP_REVIEWER_USERNAME: ${STRATEGYOS_IDP_REVIEWER_USERNAME:-reviewer.local}
      STRATEGYOS_IDP_REVIEWER_PASSWORD: ${STRATEGYOS_IDP_REVIEWER_PASSWORD:?Set STRATEGYOS_IDP_REVIEWER_PASSWORD in deploy/.env.secrets}
      STRATEGYOS_IDP_TOKEN_TTL_SECONDS: ${STRATEGYOS_IDP_TOKEN_TTL_SECONDS:-3600}
      STRATEGYOS_SENSITIVE_IDENTIFIER_HMAC_KEY: ${STRATEGYOS_SENSITIVE_IDENTIFIER_HMAC_KEY:?Set STRATEGYOS_SENSITIVE_IDENTIFIER_HMAC_KEY in deploy/.env.secrets}
      STRATEGYOS_PUBLIC_HEALTH_ENABLED: ${STRATEGYOS_PUBLIC_HEALTH_ENABLED:-false}
      STRATEGYOS_REQUIRE_HUMAN_REVIEW: ${STRATEGYOS_REQUIRE_HUMAN_REVIEW:-true}
      STRATEGYOS_TWINS_ENABLED: ${STRATEGYOS_TWINS_ENABLED:-true}
      STRATEGYOS_TWINS_MUTATIONS_ENABLED: ${STRATEGYOS_TWINS_MUTATIONS_ENABLED:-true}
      STRATEGYOS_TWINS_SCHEDULER_ENABLED: ${STRATEGYOS_TWINS_SCHEDULER_ENABLED:-true}
      STRATEGYOS_TWINS_EXPOSE_REASONING_DIAGNOSTICS: ${STRATEGYOS_TWINS_EXPOSE_REASONING_DIAGNOSTICS:-false}
      STRATEGYOS_RUN_POLICY: ${STRATEGYOS_RUN_POLICY:-sovereign}
      STRATEGYOS_APPROVED_EXTERNAL_MODES: ${STRATEGYOS_APPROVED_EXTERNAL_MODES:-}
      STRATEGYOS_MODEL_PROVIDER_ENABLED: ${STRATEGYOS_MODEL_PROVIDER_ENABLED:-false}
      STRATEGYOS_LLM_CHAT_ENABLED: ${STRATEGYOS_LLM_CHAT_ENABLED:-false}
      STRATEGYOS_LLM_PROVIDER: ${STRATEGYOS_LLM_PROVIDER:-deepseek}
      STRATEGYOS_LLM_BASE_URL: ${STRATEGYOS_LLM_BASE_URL:-https://api.deepseek.com}
      STRATEGYOS_LLM_MODEL: ${STRATEGYOS_LLM_MODEL:-deepseek-v4-pro}
      STRATEGYOS_LLM_TIMEOUT_SECONDS: ${STRATEGYOS_LLM_TIMEOUT_SECONDS:-30}
      STRATEGYOS_LLM_API_KEY: ${STRATEGYOS_LLM_API_KEY:-}
      STRATEGYOS_SYNC_ARTIFACTS: ${STRATEGYOS_SYNC_ARTIFACTS:-true}
      STRATEGYOS_OCR_ENGINE: ${STRATEGYOS_OCR_ENGINE:-tesseract}
      STRATEGYOS_RUNTIME_DEP_CA_CERTIFICATES_VERSION: ${STRATEGYOS_RUNTIME_DEP_CA_CERTIFICATES_VERSION:-20250419}
      STRATEGYOS_RUNTIME_DEP_CURL_VERSION: ${STRATEGYOS_RUNTIME_DEP_CURL_VERSION:-8.14.1-2+deb13u3}
      STRATEGYOS_RUNTIME_DEP_POPPLER_UTILS_VERSION: ${STRATEGYOS_RUNTIME_DEP_POPPLER_UTILS_VERSION:-25.03.0-5+deb13u3}
      STRATEGYOS_RUNTIME_DEP_TESSERACT_VERSION: ${STRATEGYOS_RUNTIME_DEP_TESSERACT_VERSION:-5.5.0-1+b1}
      STRATEGYOS_RUNTIME_DEP_TESSERACT_ENG_VERSION: ${STRATEGYOS_RUNTIME_DEP_TESSERACT_ENG_VERSION:-1:4.1.0-2}
      STRATEGYOS_TENANT_SLUG: ${STRATEGYOS_TENANT_SLUG:-local-poc}
      STRATEGYOS_TENANT_NAME: ${STRATEGYOS_TENANT_NAME:-StrategyOS Local POC}
      STRATEGYOS_ENVIRONMENT_LABEL: ${STRATEGYOS_ENVIRONMENT_LABEL:-Local development}
      STRATEGYOS_SOURCE_SYSTEM_NAME: ${STRATEGYOS_SOURCE_SYSTEM_NAME:-Synthetic Finance Dataset}
      STRATEGYOS_SOURCE_DATASET: ${STRATEGYOS_SOURCE_DATASET:-/app/workspace/source_dataset}
      STRATEGYOS_AGENT_INPUT_DIR: ${STRATEGYOS_AGENT_INPUT_DIR:-/app/workspace/agent_input}
      STRATEGYOS_EVALUATION_DIR: ${STRATEGYOS_EVALUATION_DIR:-/app/workspace/evaluation}
      STRATEGYOS_RUN_DIR: ${STRATEGYOS_RUN_DIR:-/app/workspace/outputs/latest}
      STRATEGYOS_RUNTIME_BACKEND: ${STRATEGYOS_RUNTIME_BACKEND:-langgraph}
      STRATEGYOS_RUN_EXECUTION_MODE: ${STRATEGYOS_RUN_EXECUTION_MODE:-sync}
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN:-}
      HATCHET_CLIENT_TLS_STRATEGY: ${HATCHET_CLIENT_TLS_STRATEGY:-none}
      HATCHET_CLIENT_HOST_PORT: ${HATCHET_CLIENT_HOST_PORT:-hatchet-lite:7077}
      STRATEGYOS_HATCHET_WORKER_NAME: ${STRATEGYOS_HATCHET_WORKER_NAME:-strategyos-worker}
      STRATEGYOS_HATCHET_WORKER_SLOTS: ${STRATEGYOS_HATCHET_WORKER_SLOTS:-1}
      STRATEGYOS_HATCHET_DASHBOARD_URL: ${STRATEGYOS_HATCHET_DASHBOARD_URL:-http://localhost:8888}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      strategyos-idp:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
    volumes:
      - strategyos-workspace:/app/workspace
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "TOKEN=$$(curl -fsS -X POST \"$$STRATEGYOS_IDP_TOKEN_URL\" -H \"Content-Type: application/x-www-form-urlencoded\" --data \"grant_type=password&client_id=$$STRATEGYOS_IDP_CLIENT_ID&client_secret=$$STRATEGYOS_IDP_CLIENT_SECRET&username=$$STRATEGYOS_IDP_OPERATOR_USERNAME&password=$$STRATEGYOS_IDP_OPERATOR_PASSWORD\" | python -c \"import json,sys; print(json.load(sys.stdin)['access_token'])\") && curl -fsS http://127.0.0.1:8000/health/ready -H \"Authorization: Bearer $$TOKEN\" >/dev/null",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  strategyos-worker:
    profiles: ["hatchet"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CA_CERTIFICATES_VERSION: ${STRATEGYOS_RUNTIME_DEP_CA_CERTIFICATES_VERSION:-20250419}
        CURL_VERSION: ${STRATEGYOS_RUNTIME_DEP_CURL_VERSION:-8.14.1-2+deb13u3}
        POPPLER_UTILS_VERSION: ${STRATEGYOS_RUNTIME_DEP_POPPLER_UTILS_VERSION:-25.03.0-5+deb13u3}
        TESSERACT_OCR_VERSION: ${STRATEGYOS_RUNTIME_DEP_TESSERACT_VERSION:-5.5.0-1+b1}
        TESSERACT_OCR_ENG_VERSION: ${STRATEGYOS_RUNTIME_DEP_TESSERACT_ENG_VERSION:-1:4.1.0-2}
    command: ["python", "-m", "strategyos_mvp.worker"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-strategyos}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env.secrets}@postgres:5432/${POSTGRES_DB:-strategyos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in deploy/.env.secrets}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      STRATEGYOS_OBJECT_ENDPOINT: ${STRATEGYOS_OBJECT_ENDPOINT:-http://minio:9000}
      STRATEGYOS_OBJECT_BUCKET: ${STRATEGYOS_OBJECT_BUCKET:-strategyos}
      STRATEGYOS_OBJECT_ACCESS_KEY_ID: ${STRATEGYOS_OBJECT_ACCESS_KEY_ID:-strategyos}
      STRATEGYOS_OBJECT_SECRET_ACCESS_KEY: ${STRATEGYOS_OBJECT_SECRET_ACCESS_KEY:?Set STRATEGYOS_OBJECT_SECRET_ACCESS_KEY in deploy/.env.secrets}
      STRATEGYOS_OBJECT_REGION: ${STRATEGYOS_OBJECT_REGION:-us-east-1}
      STRATEGYOS_OBJECT_PREFIX: ${STRATEGYOS_OBJECT_PREFIX:-strategyos}
      STRATEGYOS_OBJECT_FORCE_PATH_STYLE: ${STRATEGYOS_OBJECT_FORCE_PATH_STYLE:-true}
      STRATEGYOS_REQUIRE_HUMAN_REVIEW: ${STRATEGYOS_REQUIRE_HUMAN_REVIEW:-true}
      STRATEGYOS_TWINS_ENABLED: ${STRATEGYOS_TWINS_ENABLED:-true}
      STRATEGYOS_TWINS_SCHEDULER_ENABLED: ${STRATEGYOS_TWINS_SCHEDULER_ENABLED:-true}
      STRATEGYOS_RUN_POLICY: ${STRATEGYOS_RUN_POLICY:-sovereign}
      STRATEGYOS_APPROVED_EXTERNAL_MODES: ${STRATEGYOS_APPROVED_EXTERNAL_MODES:-}
      STRATEGYOS_SYNC_ARTIFACTS: ${STRATEGYOS_SYNC_ARTIFACTS:-true}
      STRATEGYOS_OCR_ENGINE: ${STRATEGYOS_OCR_ENGINE:-tesseract}
      STRATEGYOS_RUNTIME_BACKEND: ${STRATEGYOS_RUNTIME_BACKEND:-langgraph}
      STRATEGYOS_RUN_EXECUTION_MODE: hatchet
      STRATEGYOS_TENANT_SLUG: ${STRATEGYOS_TENANT_SLUG:-local-poc}
      STRATEGYOS_TENANT_NAME: ${STRATEGYOS_TENANT_NAME:-StrategyOS Local POC}
      STRATEGYOS_ENVIRONMENT_LABEL: ${STRATEGYOS_ENVIRONMENT_LABEL:-Local development}
      STRATEGYOS_SOURCE_SYSTEM_NAME: ${STRATEGYOS_SOURCE_SYSTEM_NAME:-Synthetic Finance Dataset}
      STRATEGYOS_SOURCE_DATASET: ${STRATEGYOS_SOURCE_DATASET:-/app/workspace/source_dataset}
      STRATEGYOS_AGENT_INPUT_DIR: ${STRATEGYOS_AGENT_INPUT_DIR:-/app/workspace/agent_input}
      STRATEGYOS_EVALUATION_DIR: ${STRATEGYOS_EVALUATION_DIR:-/app/workspace/evaluation}
      STRATEGYOS_RUN_DIR: ${STRATEGYOS_RUN_DIR:-/app/workspace/outputs/latest}
      HATCHET_CLIENT_TOKEN: ${HATCHET_CLIENT_TOKEN:-}
      HATCHET_CLIENT_TLS_STRATEGY: ${HATCHET_CLIENT_TLS_STRATEGY:-none}
      HATCHET_CLIENT_HOST_PORT: ${HATCHET_CLIENT_HOST_PORT:-hatchet-lite:7077}
      STRATEGYOS_HATCHET_WORKER_NAME: ${STRATEGYOS_HATCHET_WORKER_NAME:-strategyos-worker}
      STRATEGYOS_HATCHET_WORKER_SLOTS: ${STRATEGYOS_HATCHET_WORKER_SLOTS:-1}
      STRATEGYOS_HATCHET_DASHBOARD_URL: ${STRATEGYOS_HATCHET_DASHBOARD_URL:-http://localhost:8888}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      minio-create-bucket:
        condition: service_completed_successfully
      hatchet-lite:
        condition: service_started
    volumes:
      - strategyos-workspace:/app/workspace
    restart: unless-stopped

  strategyos-idp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        CA_CERTIFICATES_VERSION: ${STRATEGYOS_RUNTIME_DEP_CA_CERTIFICATES_VERSION:-20250419}
        CURL_VERSION: ${STRATEGYOS_RUNTIME_DEP_CURL_VERSION:-8.14.1-2+deb13u3}
        POPPLER_UTILS_VERSION: ${STRATEGYOS_RUNTIME_DEP_POPPLER_UTILS_VERSION:-25.03.0-5+deb13u3}
        TESSERACT_OCR_VERSION: ${STRATEGYOS_RUNTIME_DEP_TESSERACT_VERSION:-5.5.0-1+b1}
        TESSERACT_OCR_ENG_VERSION: ${STRATEGYOS_RUNTIME_DEP_TESSERACT_ENG_VERSION:-1:4.1.0-2}
    command: ["uvicorn", "strategyos_mvp.idp:app", "--host", "0.0.0.0", "--port", "9000"]
    environment:
      STRATEGYOS_IDP_ENABLED: ${STRATEGYOS_IDP_ENABLED:-true}
      STRATEGYOS_IDP_ISSUER: ${STRATEGYOS_IDP_ISSUER:-http://localhost:${STRATEGYOS_IDP_HTTP_PORT:-8089}}
      STRATEGYOS_IDP_CLIENT_ID: ${STRATEGYOS_IDP_CLIENT_ID:-strategyos-local-client}
      STRATEGYOS_IDP_CLIENT_SECRET: ${STRATEGYOS_IDP_CLIENT_SECRET:?Set STRATEGYOS_IDP_CLIENT_SECRET in deploy/.env.secrets}
      STRATEGYOS_IDP_OPERATOR_USERNAME: ${STRATEGYOS_IDP_OPERATOR_USERNAME:-operator.local}
      STRATEGYOS_IDP_OPERATOR_PASSWORD: ${STRATEGYOS_IDP_OPERATOR_PASSWORD:?Set STRATEGYOS_IDP_OPERATOR_PASSWORD in deploy/.env.secrets}
      STRATEGYOS_IDP_REVIEWER_USERNAME: ${STRATEGYOS_IDP_REVIEWER_USERNAME:-reviewer.local}
      STRATEGYOS_IDP_REVIEWER_PASSWORD: ${STRATEGYOS_IDP_REVIEWER_PASSWORD:?Set STRATEGYOS_IDP_REVIEWER_PASSWORD in deploy/.env.secrets}
      STRATEGYOS_IDP_TEST_USERS: ${STRATEGYOS_IDP_TEST_USERS:-}
      STRATEGYOS_IDP_TOKEN_TTL_SECONDS: ${STRATEGYOS_IDP_TOKEN_TTL_SECONDS:-3600}
    ports:
      - "${STRATEGYOS_IDP_HTTP_PORT:-8089}:9000"
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/health/live >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strategyos}
      POSTGRES_USER: ${POSTGRES_USER:-strategyos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env.secrets}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strategyos -d strategyos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hatchet-postgres:
    profiles: ["hatchet"]
    image: postgres:16-alpine
    command: postgres -c 'max_connections=200'
    environment:
      POSTGRES_DB: ${HATCHET_POSTGRES_DB:-hatchet}
      POSTGRES_USER: ${HATCHET_POSTGRES_USER:-hatchet}
      POSTGRES_PASSWORD: ${HATCHET_POSTGRES_PASSWORD:-hatchet}
    volumes:
      - hatchet-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatchet -d hatchet"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  hatchet-lite:
    profiles: ["hatchet"]
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    depends_on:
      hatchet-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${HATCHET_POSTGRES_USER:-hatchet}:${HATCHET_POSTGRES_PASSWORD:-hatchet}@hatchet-postgres:5432/${HATCHET_POSTGRES_DB:-hatchet}?sslmode=disable
      SERVER_AUTH_COOKIE_DOMAIN: localhost
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: hatchet-lite:7077
      SERVER_GRPC_PORT: "7077"
      SERVER_URL: http://localhost:8888
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
      SERVER_INTERNAL_CLIENT_INTERNAL_GRPC_BROADCAST_ADDRESS: hatchet-lite:7077
    volumes:
      - hatchet-lite-config:/config
    ports:
      - "127.0.0.1:${HATCHET_DASHBOARD_PORT:-8888}:8888"
      - "127.0.0.1:${HATCHET_GRPC_PORT:-7077}:7077"
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in deploy/.env.secrets}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in deploy/.env.secrets} 'RETURN 1;' >/dev/null",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.5
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-strategyos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in deploy/.env.secrets}
    volumes:
      - minio-data:/data
    restart: unless-stopped

  minio-create-bucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-strategyos} ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in deploy/.env.secrets}; do sleep 2; done;
      mc mb --ignore-existing local/${STRATEGYOS_OBJECT_BUCKET:-strategyos};
      mc anonymous set none local/${STRATEGYOS_OBJECT_BUCKET:-strategyos};
      "

  caddy:
    image: caddy:2-alpine
    depends_on:
      - strategyos-api
    environment:
      STRATEGYOS_SITE_ADDRESS: ${STRATEGYOS_SITE_ADDRESS:-:80}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "${STRATEGYOS_HTTP_PORT:-80}:80"
      - "${STRATEGYOS_HTTPS_PORT:-443}:443"
    restart: unless-stopped

volumes:
  strategyos-workspace:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  qdrant-data:
  minio-data:
  hatchet-postgres-data:
  hatchet-lite-config:
  caddy-data:
  caddy-config:
