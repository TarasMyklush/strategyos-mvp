services:
  strategyos-api:
    environment:
      STRATEGYOS_AUTH_MODE: ${STRATEGYOS_AUTH_MODE:-proxy_oidc}
      STRATEGYOS_TRUST_PROXY_AUTH: ${STRATEGYOS_TRUST_PROXY_AUTH:-true}
      STRATEGYOS_TRUSTED_PROXY_AUTH_SECRET: ${STRATEGYOS_TRUSTED_PROXY_AUTH_SECRET:?Set STRATEGYOS_TRUSTED_PROXY_AUTH_SECRET in deploy/.env.secrets}
      STRATEGYOS_OPERATOR_EMAILS: ${STRATEGYOS_OPERATOR_EMAILS:?Set STRATEGYOS_OPERATOR_EMAILS in deploy/.env}
      STRATEGYOS_REVIEWER_EMAILS: ${STRATEGYOS_REVIEWER_EMAILS:?Set STRATEGYOS_REVIEWER_EMAILS in deploy/.env}
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OAUTH2_PROXY_OIDC_ISSUER_URL:?Set OAUTH2_PROXY_OIDC_ISSUER_URL in deploy/.env}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:?Set OAUTH2_PROXY_CLIENT_ID in deploy/.env}
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_PROXY_REDIRECT_URL:?Set OAUTH2_PROXY_REDIRECT_URL in deploy/.env}

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0
    environment:
      OAUTH2_PROXY_PROVIDER: ${OAUTH2_PROXY_PROVIDER:-oidc}
      OAUTH2_PROXY_OIDC_ISSUER_URL: ${OAUTH2_PROXY_OIDC_ISSUER_URL:?Set OAUTH2_PROXY_OIDC_ISSUER_URL in deploy/.env}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:?Set OAUTH2_PROXY_CLIENT_ID in deploy/.env}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:?Set OAUTH2_PROXY_CLIENT_SECRET in deploy/.env.secrets}
      OAUTH2_PROXY_REDIRECT_URL: ${OAUTH2_PROXY_REDIRECT_URL:?Set OAUTH2_PROXY_REDIRECT_URL in deploy/.env}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:?Set OAUTH2_PROXY_COOKIE_SECRET in deploy/.env.secrets}
      OAUTH2_PROXY_COOKIE_SECURE: ${OAUTH2_PROXY_COOKIE_SECURE:-false}
      OAUTH2_PROXY_EMAIL_DOMAINS: ${OAUTH2_PROXY_EMAIL_DOMAINS:-*}
      OAUTH2_PROXY_SCOPE: ${OAUTH2_PROXY_SCOPE:-openid email profile}
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAMS: static://202
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "false"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SKIP_AUTH_STRIP_HEADERS: "false"
      OAUTH2_PROXY_REQUEST_LOGGING: "true"
      OAUTH2_PROXY_STANDARD_LOGGING: "true"
      OAUTH2_PROXY_AUTH_LOGGING: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:4180/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  caddy:
    volumes:
      - ./caddy/Caddyfile.proxy-oidc:/etc/caddy/Caddyfile:ro
