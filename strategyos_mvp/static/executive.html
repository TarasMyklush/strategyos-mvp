<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="navy" data-serif="on">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StrategyOS — Group CEO Diagnostics</title>
  <link rel="stylesheet" href="/static/executive.css" />
</head>
<body>
  <header class="topbar" id="topbar">
    <div class="topbar__brand">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <div class="brand-name">StrategyOS</div>
          <div class="brand-subtitle" id="brand-org">Mizan Group</div>
        </div>
      </div>
    </div>

    <div class="topbar__meta">
      <span class="topbar__badge" id="state-badge">Governed executive view</span>
      <div class="persona-menu" id="persona-menu">
        <button class="persona-btn" id="persona-btn" type="button" aria-haspopup="menu" aria-expanded="false">
          <span class="persona-btn__label">Viewing as</span>
          <span class="persona-btn__value" id="persona-label">Group CEO</span>
        </button>
        <div class="persona-list" id="pm-list" role="menu" hidden></div>
      </div>
    </div>
  </header>

  <main class="page" id="sheet">
    <section class="hero card" id="hero" aria-labelledby="hero-head">
      <div class="hero-copy">
        <p class="eyebrow" id="hero-eyebrow">Group CEO diagnostics</p>
        <h1 class="hero-title" id="hero-head">Plan health overview</h1>
        <p class="hero-body" id="hero-body">Loading executive diagnostics from the latest governed run…</p>
      </div>

      <div class="hero-score" aria-label="Plan health score">
        <svg class="score-ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle cx="60" cy="60" r="48" class="score-ring__track"></circle>
          <circle cx="60" cy="60" r="48" class="score-ring__value" id="hero-arc"></circle>
        </svg>
        <div class="hero-score__label">
          <span class="hero-score__value" id="hero-score">--</span>
          <span class="hero-score__caption" id="hero-cap">loading</span>
        </div>
      </div>
    </section>

    <section class="section" aria-labelledby="driver-heading">
      <div class="section-head">
        <h2 class="section-title" id="driver-heading">Driver index</h2>
      </div>
      <div class="driver-grid" id="driver-row"></div>
    </section>

    <section class="section" aria-labelledby="metrics-heading">
      <div class="section-head">
        <h2 class="section-title" id="metrics-heading">Key metrics</h2>
      </div>
      <div class="metrics-grid" id="metrics-grid"></div>
    </section>

    <section class="section" aria-labelledby="summary-heading">
      <div class="section-head">
        <h2 class="section-title" id="summary-heading">Summary</h2>
      </div>
      <article class="summary card" id="summary-card">
        <p class="summary-kicker" id="summary-kicker">Current readout</p>
        <h3 class="summary-title" id="summary-title">Executive signal</h3>
        <p class="summary-body" id="summary-body">Loading summary…</p>
        <p class="summary-note" id="summary-note"></p>
        <a class="summary-link" id="summary-link" href="/executive">Open governed view</a>
      </article>
    </section>
  </main>

  <script id="strategyos-executive-bootstrap" type="application/json">__STRATEGYOS_EXECUTIVE_BOOTSTRAP__</script>
  <script>window.MIZAN=window.MIZAN||{};window.MIZAN_X=window.MIZAN_X||{threads:{},assistants:{}};</script>
  <script src="/static/executive.js"></script>
</body>
</html>
