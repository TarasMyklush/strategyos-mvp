<!DOCTYPE html>
<html lang="en" data-theme="light" data-accent="navy" data-density="comfortable">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StrategyOS.live Executive Cockpit</title>
<link rel="stylesheet" href="/static/executive.css" />
</head>
<body>

<section class="topbar" id="topbar">
  <div class="tb-left">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-lockup">
        <span class="brand-name">StrategyOS</span>
        <span class="brand-org" id="brand-org">Mizan Group</span>
      </div>
    </div>
    <div class="tb-div"></div>
    <div class="tb-org" id="tb-org">
      <div class="tb-org-name" id="tb-org-name">StrategyOS Live</div>
    </div>
  </div>
  <div class="tb-right">
    <div class="badge-sov" id="sov-badge"><span class="sov-dot"></span> System of Intent</div>
    <div class="persona-menu" id="persona-menu">
      <button class="persona-btn" id="persona-btn">
        <span class="persona-btn-eyebrow">Viewing as</span>
        <span class="persona-btn-role" id="persona-label">Group CEO</span>
        <span class="persona-caret">▾</span>
      </button>
      <div class="pm-list" id="pm-list" hidden></div>
    </div>
  </div>
</section>

<div class="sheet" id="sheet">
  <section class="banner" id="hero">
    <div class="banner-copy">
      <div class="banner-eyebrow" id="hero-eyebrow">Group CEO diagnostics</div>
      <h1 class="banner-head" id="hero-head">Plan health needs reviewer closure</h1>
      <p class="banner-body" id="hero-body">4 challenged cases keep the broader plan readout bounded by evidence closure.</p>
    </div>
    <div class="ring" id="hero-ring">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="44" fill="none" stroke="var(--ring-track)" stroke-width="7" />
        <circle cx="50" cy="50" r="44" fill="none" stroke="var(--accent)" stroke-width="7"
          stroke-linecap="round" class="ring-arc" id="hero-arc" />
      </svg>
      <div class="ring-label">
        <span class="ph-score" id="hero-score">92</span>
        <span class="ph-cap" id="hero-cap">needs closure</span>
      </div>
    </div>
  </section>

  <section class="driver-row" id="driver-row"></section>

  <section class="drill" id="drill" hidden>
    <div class="drill-head">
      <div class="drill-title">
        <span class="drill-name" id="drill-name"></span>
        <span class="drill-pct" id="drill-metric"></span>
      </div>
      <button class="link-btn" id="drill-route-btn">→ evidence</button>
    </div>
    <p class="drill-foot" id="drill-foot"></p>
    <p class="drill-story" id="drill-story"></p>
    <div class="chips" id="drill-chips"></div>
  </section>

  <section class="lower" id="lower">
    <div class="lower-main">
      <div class="section-head"><h2 class="section-title">Developments</h2></div>
      <div class="feed-list" id="feed-list"></div>
    </div>
    <div class="lower-rail">
      <div class="section-head"><h2 class="section-title">Week ahead</h2></div>
      <div class="week-rail" id="week-rail"></div>
    </div>
  </section>
</div>

<script id="strategyos-executive-bootstrap" type="application/json">__STRATEGYOS_EXECUTIVE_BOOTSTRAP__</script>
<script>
window.MIZAN = window.MIZAN || {};
window.MIZAN_X = window.MIZAN_X || { threads: {}, assistants: {} };
</script>
<script src="/static/executive.js"></script>
</body>
</html>
